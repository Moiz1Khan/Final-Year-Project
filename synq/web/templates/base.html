<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="{% block theme_color %}#0a0b0f{% endblock %}" />
  <title>{% block title %}Synq{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css?v=aura9" />
  {% block head_extra %}{% endblock %}
</head>
<body class="synq-ui {% block body_class %}{% endblock %}">
{% block outer %}
  <div class="auth-shell">
    <div class="auth-ambient" aria-hidden="true"></div>
    <header class="auth-top">
      <a href="/" class="brand-mark">Synq</a>
      <nav class="auth-nav">{% block nav %}{% endblock %}</nav>
    </header>
    <main class="auth-main">
      {% block content %}{% endblock %}
    </main>
  </div>
{% endblock %}
<script src="/static/app.js?v=aura3" defer></script>
{% block scripts %}{% endblock %}
</body>
</html>
