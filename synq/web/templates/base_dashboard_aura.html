{% extends "base.html" %}
{% block head_extra %}
<link rel="stylesheet" href="/static/dash-aura.css?v=1" />
{% endblock %}
{% block theme_color %}#e8f6f8{% endblock %}
{% block body_class %}dash-app{% endblock %}
{% block outer %}
<div class="dash-app-wrap">
  <div class="dash-draft-shell">
    <header class="dash-topbar">
      <a class="dash-topbar-brand" href="/app">
        <img src="/static/brand/synq-logo.png?v=1" alt="Synq" width="120" height="32" decoding="async" />
      </a>
      <nav class="dash-topbar-nav" aria-label="Console">
        <a href="/app" class="{% if dash_active == 'overview' %}is-active{% endif %}">Overview</a>
        <a href="/app/activity" class="{% if dash_active == 'activity' %}is-active{% endif %}">Activity</a>
        <a href="/app/features" class="{% if dash_active == 'features' %}is-active{% endif %}">Features</a>
        <a href="/docs" target="_blank" rel="noopener">API</a>
      </nav>
      <form class="dash-search" method="get" action="/app/activity" role="search" aria-label="Search activity">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" name="q" value="{{ activity_query or '' }}" placeholder="Search activity…" autocomplete="off" />
      </form>
      <div class="dash-topbar-actions">
        <a class="dash-btn-ghost" href="/app/features">Help</a>
        <a class="dash-btn-ghost" href="/app/credentials">Account</a>
        <a class="dash-btn-primary" href="/logout">Log out</a>
      </div>
    </header>
    {% block dash_content %}{% endblock %}
  </div>
</div>
{% endblock %}
